workflows:
  android-native-workflow:
    name: Compilación Nativa Android APK (Fuerza Gradle 9.3.1)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - android_credentials
      vars:
        JAVA_VERSION: "21" # Gradle 9 requiere Java 21+ para compilar de forma nativa
    triggering:
      events:
        - push
    scripts:
      - name: Configurar Entorno Java 21
        script: |
          jenv global $JAVA_VERSION
          java -version
      - name: Reparar Entorno y Compilar APK
        script: |
          echo "=== REPARANDO Y FORZANDO VERSIÓN DE GRADLE ==="
          
          # Generar el wrapper pero forzando la versión exacta 9.3.1 que pide tu app
          gradle wrapper --gradle-version 9.3.1
          
          echo "=== VERIFICANDO ARCHIVOS GENERADOS ==="
          ls -la gradlew
          cat gradle/wrapper/gradle-wrapper.properties

          echo "=== INICIANDO COMPILACIÓN DEL APK ==="
          chmod +x gradlew
          ./gradlew clean assembleDebug
    artifacts:
      - "**/build/outputs/apk/debug/*.apk"
