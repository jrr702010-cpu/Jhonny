workflows:
  android-native-workflow:
    name: Compilación Nativa Android APK
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - android_credentials
      vars:
        JAVA_VERSION: "17" # Ajusta a "11" si tu proyecto es más antiguo
    triggering:
      events:
        - push
    scripts:
      - name: Configurar Entorno Java
        script: |
          echo "Configurando la versión de Java..."
          jenv global $JAVA_VERSION
          java -version
      - name: Otorgar permisos y Compilar APK
        script: |
          echo "=== Iniciando compilación de Gradle ==="
          # Otorgar permisos de ejecución al script compilador de tu raíz
          chmod +x gradlew
          
          # Ejecutar el empaquetado limpio del APK en modo Debug
          ./gradlew clean assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/*.apk
