workflows:
  android-native-workflow:
    name: Compilación Nativa Android APK (Auto-Reparación de Gradle)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - android_credentials
      vars:
        JAVA_VERSION: "17"
    triggering:
      events:
        - push
    scripts:
      - name: Configurar Entorno Java
        script: |
          jenv global $JAVA_VERSION
          java -version
      - name: Reparar Entorno y Compilar APK
        script: |
          echo "=== REVISANDO ARCHIVOS EN LA RAÍZ ==="
          ls -la

          # Generar el archivo ejecutable gradlew si hace falta en el servidor
          if [ ! -f "gradlew" ]; then
            echo "⚠️ No se encontró el ejecutable 'gradlew'. Reparando entorno de Gradle..."
            gradle wrapper
          fi

          echo "=== VERIFICANDO GENERACIÓN DE GRADLEW ==="
          ls -la gradlew

          echo "=== INICIANDO COMPILACIÓN DEL APK ==="
          chmod +x gradlew
          ./gradlew clean assembleDebug
    artifacts:
      - "**/build/outputs/apk/debug/*.apk"
